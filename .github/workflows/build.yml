name: Pose Video Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  annotate:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build pipeline
        run: swift build -c release --product PosePipeline

      - name: Run pose pipeline
        run: |
          .build/release/PosePipeline video.mp4 output.mp4

      - name: Upload annotated video
        uses: actions/upload-artifact@v4
        with:
          name: annotated-video
          path: output.mp4
